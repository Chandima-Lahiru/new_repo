<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* CSS Styling Section */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .profile-card {
            background: var(--card-bg);
            width: 350px;
            border-radius: 20px; /* Improved: Rounded corners */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); /* Improved: Shadow */
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            background: #f7fafc;
            padding: 40px 20px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background: #e2e8f0;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .profile-img span {
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .card-body {
            padding: 20px 30px 40px;
        }

        h2 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 600;
        }

        .stream {
            color: #667eea;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 5px 0 15px;
        }

        .bio {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- <div> Structure -->
    <div class="profile-card">
        <div class="card-header">
            <div class="profile-img">
                <span>Photo</span>
            </div>
        </div>
        <div class="card-body">
            <h2>Chandima Lahiru</h2>
            <p class="stream">Information Systems</p>
            <p class="bio">
                Passionate about building intuitive user interfaces and exploring the potential of machine learning. Always learning, one line of code at a time.
            </p>
        </div>
    </div>

</body>
</html>
